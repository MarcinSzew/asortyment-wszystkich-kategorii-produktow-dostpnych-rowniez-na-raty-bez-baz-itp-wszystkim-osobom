<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najwyższej jako 1‑ej klasy profesjonalne luksusowe oferty handlowe dostępne również na raty</title>
<style>
body { font-family:Arial; margin:0; background:#f2f2f2;}
header { background:#003366; color:white; padding:20px; text-align:center;}
main { padding:20px; }
section { background:white; padding:15px; margin:15px 0; border-radius:6px;}
input, select { width:100%; padding:8px; margin:6px 0; }
button { background:#003366; color:white; border:none; padding:10px; cursor:pointer;}
.product { border-top:1px solid #ccc; padding-top:15px; margin-top:15px;}
.calc { background:#f9f9f9; padding:10px; margin-top:10px; border-radius:5px;}
</style>
</head>
<body>

<header>
<h1>Najwyższej klasy profesjonalne i luksusowe oferty handlowe</h1>
<p>dostępne również na raty bez baz itp. weryfikacji finansowych</p>
<button onclick="showPremium()">Premium</button>
<button onclick="showAll()">Wszystkie</button>
</header>

<main>

<section>
<h2>Wyszukiwarka ofert</h2>
<input id="search" placeholder="Szukaj po nazwie lub opisie..." onkeyup="searchOffer()">
</section>

<section>
<h2>Filtr kategorii</h2>
<select id="filterCategory" onchange="filterOffer()">
<option value="all">Wszystkie</option>
</select>
</section>

<section>
<h2>Oferty</h2>
<div id="offers"></div>
</section>

</main>

<footer>
<p>Kontakt: Marcin Szewczyk</p>
<p>Email: profesja.premium@gmail.com | Tel: +48 886 636 981</p>
</footer>

<script>
let offers=[];

// wczytaj JSON
fetch("offers.json")
  .then(r => r.json())
  .then(data => {
    offers = data;
    setupCategories();
    renderOffers();
  });

// dodaj kategorie do filtra
function setupCategories(){
  const cats = [...new Set(offers.map(o=>o.category))];
  let sel = document.getElementById("filterCategory");
  cats.forEach(c=>{
    let opt = document.createElement("option");
    opt.value=c; opt.text=c;
    sel.add(opt);
  });
}

function renderOffers(filtered){
  const container=document.getElementById("offers");
  container.innerHTML = "";
  (filtered || offers).forEach((o,i)=>{
    let div=document.createElement("div");
    div.className="product";
    div.innerHTML=`
      <h3>${o.title}</h3>
      <p><b>Kategoria:</b> ${o.category}</p>
      ${o.image?`<img src="${o.image}" width="300"><br><br>`:""}
      ${o.video?`<video width="300" controls><source src="${o.video}" type="video/mp4"></video><br><br>`:""}
      <p><b>Opis:</b> ${o.desc}</p>
      <p><b>Parametry:</b> ${o.params}</p>
      <p><b>Cena rynkowa:</b> ${o.price} PLN</p>
      <p><b>Kwota finansowania:</b> ${o.finance} PLN</p>
      <p><b>Cena hurtowa:</b> ${(o.price*0.7755).toFixed(2)} PLN</p>
      <p><b>Cena detaliczna:</b> ${(o.price*0.84).toFixed(2)} PLN</p>

      <div class="calc">
        <label>Kwota do sfinansowania:</label>
        <input type="number" id="fin${i}" value="${o.finance}" oninput="calcRate(${i})">
        <p id="rate${i}">Rata orientacyjna: ${(o.finance/12).toFixed(2)} PLN / mies.</p>
      </div>
    `;
    container.appendChild(div);
  });
}

function calcRate(i){
  let val = document.getElementById("fin"+i).value;
  document.getElementById("rate"+i).innerText = "Rata orientacyjna: "+(val/12).toFixed(2)+" PLN / mies.";
}

function searchOffer(){
  let q=document.getElementById("search").value.toLowerCase();
  renderOffers( offers.filter(o => 
    o.title.toLowerCase().includes(q) || o.desc.toLowerCase().includes(q)
  ));
}

function filterOffer(){
  let c=document.getElementById("filterCategory").value;
  renderOffers( c==="all" ? offers : offers.filter(o=>o.category===c) );
}

// Premium tylko
function showPremium(){
  renderOffers(offers.filter(o=>o.premium));
}
function showAll(){
  renderOffers();
}
</script>

</body>
</html>
